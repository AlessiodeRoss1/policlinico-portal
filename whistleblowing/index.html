<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Whistleblowing</title>

<style>
body{
margin:0;
font-family:Segoe UI, Arial;
background:#0f172a;
}

.wrapper{
display:flex;
height:100vh;
}

/* LEFT */
.left{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
color:white;
background:#0f172a;
padding:40px;
text-align:center;
}

.left img{
width:180px;
margin-bottom:20px;
}

/* RIGHT */
.right{
flex:1.2;
display:flex;
justify-content:center;
align-items:center;
background:#f1f5f9;
padding:20px;
}

/* CARD */
.card{
width:520px;
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
flex:1;
text-align:center;
padding:10px;
border-radius:10px;
cursor:pointer;
background:#e2e8f0;
font-size:13px;
}

.tab.active{
background:#0b6b4f;
color:white;
}

/* INPUT */
input,textarea,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #cbd5e1;
}

textarea{height:100px;}

/* BUTTON */
button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:#0b6b4f;
color:white;
font-weight:600;
}

/* STATUS */
.status-bar{
display:flex;
justify-content:space-between;
margin-top:20px;
font-size:12px;
}

.step{
text-align:center;
flex:1;
}

.circle{
width:10px;
height:10px;
border-radius:50%;
background:#cbd5e1;
margin:auto;
}

.active .circle{
background:#0b6b4f;
}

.report{
padding:10px;
border:1px solid #e2e8f0;
border-radius:10px;
margin-top:10px;
}
</style>

</head>

<body>

<div class="wrapper">

<!-- LEFT -->
<div class="left">
<img src="./logo-gemelli.png">
<p>Sistema anonimo del Policlinico</p>
</div>

<!-- RIGHT -->
<div class="right">

<div class="card">

<div class="tabs">
<div class="tab active" onclick="show('ins',this)">Inserisci</div>
<div class="tab" onclick="show('ver',this)">Verifica</div>
<div class="tab" onclick="show('adm',this)">Responsabili</div>
</div>

<!-- INSERISCI -->
<div id="ins">

<input id="email" type="email" placeholder="La tua email">

<input id="obj" placeholder="Oggetto">

<select id="cat">
<option>Corruzione</option>
<option>Abuso</option>
<option>Sicurezza</option>
<option>Altro</option>
</select>

<textarea id="desc" placeholder="Descrizione"></textarea>

<input id="anon" placeholder="Anonimo SI / NO">

<button onclick="send()">Invia</button>

<div id="out1"></div>

</div>

<!-- VERIFICA -->
<div id="ver" style="display:none">

<input id="code" placeholder="Codice WH-XXXXXX">

<button onclick="check()">Verifica</button>

<div id="out2"></div>

<div id="track" style="display:none">

<div class="status-bar">
<div class="step"><div class="circle"></div><div>Ricevuta</div></div>
<div class="step"><div class="circle"></div><div>Analisi</div></div>
<div class="step"><div class="circle"></div><div>Revisione</div></div>
<div class="step"><div class="circle"></div><div>Chiusa</div></div>
</div>

</div>

</div>

<!-- ADMIN -->
<div id="adm" style="display:none">

<input id="u" placeholder="user">
<input id="p" type="password" placeholder="password">

<button onclick="login()">Login</button>

<div id="panel" style="display:none">

<div id="list"></div>

<select id="st">
<option>Ricevuta</option>
<option>Analisi</option>
<option>Revisione</option>
<option>Chiusa</option>
</select>

<button onclick="update()">Aggiorna</button>

</div>

</div>

</div>

</div>

<script>

let reports=[];
let selected=null;

function show(t,el){
["ins","ver","adm"].forEach(x=>document.getElementById(x).style.display="none");
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
document.getElementById(t).style.display="block";
el.classList.add("active");
}

function send(){

fetch("/api/segnalazione",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
email:email.value,
obj:obj.value,
cat:cat.value,
desc:desc.value,
anon:anon.value
})
})
.then(r=>r.json())
.then(d=>{
out1.innerHTML="Codice: <b>"+d.code+"</b>";
});

}

function check(){

fetch("/api/verifica/"+code.value)
.then(r=>r.json())
.then(r=>{

if(r.error){
out2.innerHTML="Non trovata";
return;
}

out2.innerHTML="✔ "+r.code+" - "+r.status;
track.style.display="block";

});

}

function login(){
if(u.value==="admin" && p.value==="1234"){
panel.style.display="block";
load();
}
}

function load(){

list.innerHTML="";

fetch("/api/list")
.then(r=>r.json())
.then(data=>{

data.forEach(r=>{

let d=document.createElement("div");
d.className="report";
d.innerHTML=r.code+" - "+r.status;

d.onclick=()=>selected=r;

list.appendChild(d);

});

});

}

function update(){

fetch("/api/update",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
code:selected.code,
status:st.value
})
});

load();

}

</script>

</body>
</html>
