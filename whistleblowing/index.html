<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Whistleblowing</title>

<style>
body{
  font-family: Arial;
  background:#f4f6f8;
  margin:0;
  padding:20px;
}

h2{
  margin-top:0;
}

.box{
  background:white;
  padding:15px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  margin-bottom:20px;
}

input, select, textarea, button{
  width:100%;
  padding:10px;
  margin-top:8px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
  box-sizing:border-box;
}

button{
  background:#0b6b4f;
  color:white;
  border:none;
  cursor:pointer;
}

button:hover{
  background:#095a42;
}

.status{
  font-weight:bold;
  color:#0b6b4f;
}
</style>
</head>

<body>

<h2>Whistleblowing System</h2>

<!-- ================= INSERISCI ================= -->
<div class="box">
  <h3>Inserisci segnalazione</h3>

  <input id="obj" placeholder="Oggetto">

  <select id="category">
    <option value="">Categoria</option>
    <option>Corruzione</option>
    <option>Abuso</option>
    <option>Sicurezza</option>
    <option>Altro</option>
  </select>

  <textarea id="desc" placeholder="Descrizione"></textarea>

  <input id="place" placeholder="Luogo evento">
  <input id="date" type="date">

  <label>
    <input type="checkbox" id="anon"> Segnalazione anonima
  </label>

  <button onclick="send()">Invia segnalazione</button>

  <p id="result"></p>
</div>

<!-- ================= VERIFICA ================= -->
<div class="box">
  <h3>Verifica segnalazione</h3>

  <input id="code" placeholder="Inserisci codice (es. WH-XXXXXX)">
  <button onclick="check()">Verifica</button>

  <div id="out"></div>
</div>

<script>

// ---------------- INVIO ----------------
async function send(){

  let obj = document.getElementById("obj").value;
  let category = document.getElementById("category").value;
  let desc = document.getElementById("desc").value;

  let res = await fetch("/api/segnalazione", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ obj, category, desc })
  });

  let data = await res.json();

  document.getElementById("result").innerHTML =
    "✔ Segnalazione inviata<br><b>Codice:</b> " + data.code;
}

// ---------------- VERIFICA ----------------
async function check(){

  let code = document.getElementById("code").value;

  let res = await fetch("/api/verifica/" + code);
  let data = await res.json();

  if(data.error){
    document.getElementById("out").innerHTML =
      "<div class='box'>❌ Segnalazione non trovata</div>";
    return;
  }

  document.getElementById("out").innerHTML = `
    <div class="box">
      <h3>✔ Segnalazione trovata</h3>

      <p><b>Codice:</b> ${data.code}</p>
      <p><b>Oggetto:</b> ${data.obj}</p>
      <p><b>Categoria:</b> ${data.category || "-"}</p>
      <p><b>Descrizione:</b> ${data.desc || "-"}</p>

      <p class="status"><b>Stato:</b> ${data.status}</p>
    </div>
  `;
}

</script>

</body>
</html>
