<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Whistleblowing</title>

<style>
body{
margin:0;
font-family:Segoe UI, Arial;
background:#0f172a;
}

/* LAYOUT */
.wrapper{
display:flex;
height:100vh;
}

/* SINISTRA */
.left{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#0f172a;
color:white;
padding:40px;
text-align:center;
}

/* FIX LOGO */
.left img{
width:180px;
max-width:80%;
margin-bottom:20px;
}

.left p{
opacity:0.8;
font-size:14px;
max-width:300px;
}

/* DESTRA */
.right{
flex:1.2;
display:flex;
align-items:center;
justify-content:center;
background:#f1f5f9;
padding:20px;
}

/* CARD */
.card{
width:520px;
background:white;
border-radius:16px;
padding:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
flex:1;
text-align:center;
padding:10px;
border-radius:10px;
cursor:pointer;
background:#e2e8f0;
font-size:13px;
}

.tab.active{
background:#0b6b4f;
color:white;
}

/* INPUT */
input,textarea,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #cbd5e1;
}

textarea{
height:110px;
resize:none;
}

/* BUTTON */
button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
background:#0b6b4f;
color:white;
}

/* STATUS BAR */
.status-bar{
display:flex;
justify-content:space-between;
margin-top:15px;
font-size:12px;
}

.step{
flex:1;
text-align:center;
position:relative;
}

.circle{
width:12px;
height:12px;
border-radius:50%;
background:#cbd5e1;
margin:auto;
}

.active .circle{
background:#0b6b4f;
}

.label{
margin-top:5px;
}

/* REPORT */
.report{
padding:10px;
border:1px solid #e2e8f0;
border-radius:10px;
margin-top:10px;
}
</style>

</head>

<body>

<div class="wrapper">

<!-- SINISTRA -->
<div class="left">

<!-- FIX LOGO PATH -->
<img src="./logo-gemelli.png" onerror="this.style.display='none'">

<h2>Whistleblowing System</h2>
<p>Sistema anonimo e sicuro del Policlinico.</p>

</div>

<!-- DESTRA -->
<div class="right">

<div class="card">

<!-- TABS -->
<div class="tabs">
<div class="tab active" onclick="show('ins',this)">Inserisci</div>
<div class="tab" onclick="show('ver',this)">Verifica</div>
<div class="tab" onclick="show('adm',this)">Responsabili</div>
</div>

<!-- INSERISCI (FORM COMPLETO) -->
<div id="ins">

<input id="obj" placeholder="Oggetto segnalazione">

<select id="cat">
<option>Corruzione</option>
<option>Abuso</option>
<option>Sicurezza</option>
<option>Altro</option>
</select>

<textarea id="desc" placeholder="Descrizione dettagliata"></textarea>

<input id="anon" placeholder="Anonimo SI / NO">

<button onclick="send()">Invia segnalazione</button>

<div id="out1"></div>

</div>

<!-- VERIFICA + STATO COMPLETO -->
<div id="ver" style="display:none">

<input id="code" placeholder="Codice WH-XXXXXX">

<button onclick="check()">Verifica</button>

<div id="out2"></div>

<div id="track" style="display:none;margin-top:20px">

<div class="status-bar">
<div class="step"><div class="circle"></div><div class="label">Ricevuta</div></div>
<div class="step"><div class="circle"></div><div class="label">In analisi</div></div>
<div class="step"><div class="circle"></div><div class="label">Revisione</div></div>
<div class="step"><div class="circle"></div><div class="label">Chiusa</div></div>
</div>

</div>

</div>

<!-- ADMIN -->
<div id="adm" style="display:none">

<input id="u" placeholder="user">
<input id="p" type="password" placeholder="password">

<button onclick="login()">Accedi</button>

<div id="panel" style="display:none">

<div id="list"></div>

<select id="st">
<option>Ricevuta</option>
<option>In analisi</option>
<option>Revisione</option>
<option>Chiusa</option>
</select>

<button onclick="update()">Aggiorna</button>

</div>

</div>

</div>

</div>

<script>

let reports=[];
let selected=null;

function show(t,el){

["ins","ver","adm"].forEach(x=>document.getElementById(x).style.display="none");
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));

document.getElementById(t).style.display="block";
el.classList.add("active");

}

/* CODE */
function code(){
return "WH-"+Math.floor(100000+Math.random()*900000);
}

/* INSERIMENTO */
function send(){

let obj=document.getElementById("obj").value;
let cat=document.getElementById("cat").value;
let desc=document.getElementById("desc").value;
let anon=document.getElementById("anon").value;

let c=code();

reports.push({
code:c,
obj,cat,desc,
status:"Ricevuta"
});

document.getElementById("out1").innerHTML="Codice: <b>"+c+"</b>";

}

/* VERIFICA + STATO */
function check(){

let c=document.getElementById("code").value;
let r=reports.find(x=>x.code===c);

if(!r){
document.getElementById("out2").innerHTML="Non trovata";
document.getElementById("track").style.display="none";
return;
}

document.getElementById("out2").innerHTML=
"✔ trovata <b>"+r.code+"</b><br>Stato: "+r.status;

document.getElementById("track").style.display="block";

}

/* LOGIN */
function login(){

if(u.value==="admin" && p.value==="1234"){
document.getElementById("panel").style.display="block";
load();
}else alert("err");

}

/* LISTA */
function load(){

let l=document.getElementById("list");
l.innerHTML="";

reports.forEach(r=>{

let d=document.createElement("div");
d.className="report";
d.innerHTML=r.code+" - "+r.status;

d.onclick=()=>selected=r;

l.appendChild(d);

});

}

/* UPDATE */
function update(){

if(!selected)return;

selected.status=document.getElementById("st").value;

load();

}

</script>

</body>
</html>
