<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Whistleblowing</title>

<style>
body{
margin:0;
font-family:Segoe UI, Arial;
background:#0f172a;
}

/* SPLIT */
.wrapper{
display:flex;
height:100vh;
}

/* SINISTRA (BRAND CLEAN) */
.left{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:#0f172a;
color:white;
padding:40px;
text-align:center;
}

.left img{
width:180px;
margin-bottom:20px;
}

.left h1{
font-size:28px;
margin:10px 0;
}

.left p{
opacity:0.8;
max-width:300px;
font-size:14px;
}

/* DESTRA */
.right{
flex:1.2;
display:flex;
align-items:center;
justify-content:center;
background:#f1f5f9;
padding:20px;
}

/* CARD */
.card{
width:520px;
background:white;
border-radius:16px;
padding:25px;
box-shadow:0 20px 60px rgba(0,0,0,0.15);
}

/* TABS */
.tabs{
display:flex;
gap:10px;
margin-bottom:20px;
}

.tab{
flex:1;
text-align:center;
padding:10px;
border-radius:10px;
cursor:pointer;
font-size:13px;
background:#e2e8f0;
color:#334155;
transition:0.2s;
}

.tab.active{
background:#0b6b4f;
color:white;
}

/* INPUT */
input,textarea,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:1px solid #cbd5e1;
outline:none;
}

textarea{
height:110px;
resize:none;
}

/* BUTTON */
button{
width:100%;
margin-top:10px;
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.btn{
background:#0b6b4f;
color:white;
}

.btn:hover{
background:#09543d;
}

/* BOX RESULT */
.result{
margin-top:10px;
font-size:14px;
}

/* REPORT */
.report{
padding:10px;
border:1px solid #e2e8f0;
border-radius:10px;
margin-top:10px;
cursor:pointer;
background:#f8fafc;
}

/* STATUS */
.status{
margin-top:10px;
font-size:13px;
color:#334155;
}
</style>

</head>

<body>

<div class="wrapper">

<!-- SINISTRA -->
<div class="left">
<img src="logo-gemelli.png">
<h1>Whistleblowing System</h1>
<p>Sistema sicuro e anonimo per la gestione delle segnalazioni interne del Policlinico.</p>
</div>

<!-- DESTRA -->
<div class="right">

<div class="card">

<!-- TABS -->
<div class="tabs">
<div class="tab active" onclick="show('ins',this)">Inserisci</div>
<div class="tab" onclick="show('ver',this)">Verifica</div>
<div class="tab" onclick="show('adm',this)">Responsabili</div>
</div>

<!-- INSERISCI -->
<div id="ins">

<input id="obj" placeholder="Oggetto">
<textarea id="desc" placeholder="Descrizione segnalazione"></textarea>
<input id="anon" placeholder="Anonimo SI / NO">

<button class="btn" onclick="send()">Invia segnalazione</button>

<div class="result" id="out1"></div>

</div>

<!-- VERIFICA -->
<div id="ver" style="display:none">

<input id="code" placeholder="Codice WH-XXXXXX">
<button class="btn" onclick="check()">Verifica</button>

<div id="out2"></div>

</div>

<!-- ADMIN -->
<div id="adm" style="display:none">

<input id="u" placeholder="user">
<input id="p" type="password" placeholder="password">
<button class="btn" onclick="login()">Accedi</button>

<div id="panel" style="display:none;margin-top:15px">

<div id="list"></div>

<select id="st">
<option>Ricevuta</option>
<option>In analisi</option>
<option>In revisione</option>
<option>Chiusa</option>
</select>

<button class="btn" onclick="update()">Aggiorna stato</button>

</div>

</div>

</div>

</div>

</div>

<script>

let reports=[];
let selected=null;

function show(t,el){

["ins","ver","adm"].forEach(x=>document.getElementById(x).style.display="none");
document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));

document.getElementById(t).style.display="block";
el.classList.add("active");

}

function code(){
return "WH-"+Math.floor(100000+Math.random()*900000);
}

/* SEND */
function send(){

let obj=document.getElementById("obj").value;
let desc=document.getElementById("desc").value;
let anon=document.getElementById("anon").value;

let c=code();

reports.push({
code:c,
obj,
desc,
status:"Ricevuta"
});

document.getElementById("out1").innerHTML="Codice: <b>"+c+"</b>";
}

/* CHECK */
function check(){

let c=document.getElementById("code").value;
let r=reports.find(x=>x.code===c);

if(!r){
document.getElementById("out2").innerHTML="Non trovata";
return;
}

document.getElementById("out2").innerHTML=
"✔ "+r.code+"<br><div class='status'>Stato: "+r.status+"</div>";

}

/* LOGIN */
function login(){

if(u.value==="admin" && p.value==="1234"){
document.getElementById("panel").style.display="block";
load();
}else alert("err");

}

/* LOAD */
function load(){

let l=document.getElementById("list");
l.innerHTML="";

reports.forEach(r=>{

let d=document.createElement("div");
d.className="report";
d.innerHTML=r.code+" - "+r.status;

d.onclick=()=>selected=r;

l.appendChild(d);

});

}

/* UPDATE */
function update(){

if(!selected)return;

selected.status=document.getElementById("st").value;
load();

}

</script>

</body>
</html>
