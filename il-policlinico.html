<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>Whistleblowing</title>

<style>
body{
margin:0;
font-family:Segoe UI, Arial;
background:#eef2f5;
color:#0b2f4f;
}

/* HEADER SEMPLICE */
header{
background:white;
padding:15px 25px;
border-bottom:1px solid #ddd;
font-weight:bold;
}

/* CONTAINER DUE COLONNE */
.container{
display:flex;
gap:20px;
max-width:1100px;
margin:30px auto;
padding:0 20px;
}

/* BOX */
.box{
flex:1;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

/* TITOLI */
h2{
margin-top:0;
color:#0b6b4f;
}

/* INPUT */
input, select, textarea, button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
font-family:inherit;
}

textarea{
resize:none;
height:120px;
}

/* BUTTON */
button{
background:#0b6b4f;
color:white;
border:none;
cursor:pointer;
font-weight:bold;
}

button:hover{
background:#09543d;
}

/* RISULTATO */
.result{
margin-top:10px;
font-weight:bold;
color:#0b2f4f;
}

/* VERIFICA BOX */
.report{
margin-top:15px;
padding:15px;
border-radius:10px;
background:#f7f9fb;
border:1px solid #ddd;
}

/* STATUS LINE */
.status{
margin-top:15px;
display:flex;
justify-content:space-between;
font-size:12px;
}

.step{
text-align:center;
flex:1;
position:relative;
}

.circle{
width:14px;
height:14px;
border-radius:50%;
background:#ccc;
margin:auto;
}

.active .circle{
background:#0b6b4f;
}

.label{
margin-top:5px;
}
</style>

</head>

<body>

<header>
Whistleblowing System
</header>

<div class="container">

<!-- COLONNA SINISTRA: INSERIMENTO -->
<div class="box">
<h2>Inserisci segnalazione</h2>

<input id="obj" placeholder="Oggetto">

<select id="category">
<option>Corruzione</option>
<option>Abuso</option>
<option>Sicurezza</option>
<option>Altro</option>
</select>

<textarea id="desc" placeholder="Descrizione dettagliata"></textarea>

<button onclick="send()">Invia segnalazione</button>

<div class="result" id="result"></div>
</div>

<!-- COLONNA DESTRA: VERIFICA -->
<div class="box">
<h2>Verifica segnalazione</h2>

<input id="code" placeholder="Codice (es. WH-123456)">
<button onclick="check()">Verifica stato</button>

<div id="out"></div>
</div>

</div>

<script>

function renderStatus(status){

const steps=["Ricevuta","In verifica","In lavorazione","Chiusa"];
let current=steps.indexOf(status);

return `
<div class="status">
${steps.map((s,i)=>`
<div class="step ${i<=current?'active':''}">
<div class="circle"></div>
<div class="label">${s}</div>
</div>
`).join("")}
</div>
`;

}

async function send(){

let obj=document.getElementById("obj").value;
let category=document.getElementById("category").value;
let desc=document.getElementById("desc").value;

let res=await fetch("/api/segnalazione",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({obj,category,desc})
});

let data=await res.json();

document.getElementById("result").innerHTML=
"Codice assegnato: <b>"+data.code+"</b>";
}

async function check(){

let code=document.getElementById("code").value;

let res=await fetch("/api/verifica/"+code);
let data=await res.json();

if(data.error){
document.getElementById("out").innerHTML="Segnalazione non trovata";
return;
}

document.getElementById("out").innerHTML=`
<div class="report">
<b>Codice:</b> ${data.code}<br>
<b>Oggetto:</b> ${data.obj}<br>
<b>Categoria:</b> ${data.category}<br>
<b>Stato:</b> ${data.status}

${renderStatus(data.status)}

</div>
`;

}

</script>

</body>
</html>
